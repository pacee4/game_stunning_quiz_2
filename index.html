<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">

    <title>Ошеломляющая викторина Часть 2</title>
  <script type="module" crossorigin src="./assets/index-tcsGngKK.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-D57125GB.css">
</head>

<body>
    <div id="g-divContainer" class="g-flex g-center">
        <div id="g-divGame" class="hide">
            <div id="g-divCanvasPositioning" class="g-flex g-center g-extend">
                <div id="g-divCanvas">
                    <!-- (EDITABLE) -->
                    <div id="g-divCanvasElements" class="hide g-transparent">
                        
                    </div>
                </div>
            </div>
        </div>

        <div id="g-fullscreenOverlay" class="hide g-extend g-flex g-center">
            <div class="g-flex g-column g-center">
                <img src="icons/rotate_device.svg" alt="Поверните устройство" aria-hidden="true">
                <p></p>
            </div>
        </div>

        <div id="g-mainPanel" class="g-panel">
            <button id="g-bFullscreen" class="hide2">
                <img src="./icons/fullscreen_enter.svg" alt="На весь экран" class="">
                <img src="./icons/fullscreen_exit.svg" alt="На весь экран" class="hide">
                <img src="./icons/close.svg" alt="Закрыть" class="hide">
            </button>
            <button id="g-bInfo"><img src="./icons/info.svg" alt="i"></button>
        </div>

        <div id="g-divProgressBar" class="g-flex g-column g-center">
            <p id="g-progressBarText" class="g-unselectable"><noscript>Включите JavaScript</noscript></p>
            <p id="g-progressBarError" class="hide"></p>
            <div id="g-progressBar">
                <div id="g-progressBarValue"></div>
            </div>
        </div>

        <div id="g-modal" class="hide"
            role="dialog"
            aria-modal="true"
            aria-labelledby="g-mwName"
            aria-describedby="g-modalDivContent"
        >
            <div id="g-modalBackground"></div>
            <div id="g-modalFlexP" class="g-flex g-center g-extend  js-closeModal">
                <div id="g-modalWindow" class="g-flex g-column">

                    <div id="g-modalInnerContent" class="mp f-extend">
                        <h1 id="g-mwName">Pick Colors</h1>
                        <div id="g-modalDivContent">
                            <p class="m bottom-4"></p>
                        </div>
                    </div>

                    <div>
                        <hr class="horizontal-line">
                        <menu class="info g-flex g-center">
                            <li><a id="g-mwAQuit" href="/">Выйти из игры</a></li>
                            <li><button id="g-mwAClose">Закрыть</button></li>
                        </menu>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelector("#g-modalDivContent > p").textContent = "Загрузка информации...";
        document.getElementById("g-progressBarText").textContent = "Загрузка... 0%";

        {
            function displayError(reason) {
                console.error(reason);
                
                document.getElementById("g-divProgressBar").classList.remove("hide");
                const elProgressBarError = document.getElementById("g-progressBarError");
                elProgressBarError.classList.remove("hide");
                document.getElementById("g-progressBarText").textContent = "Ошибка загрузки";
                elProgressBarError.textContent = reason;
            }

            window.addEventListener("error", function(event) {
                if (window.location.protocol === "file:" || window.location.origin == "null") {
                    displayError("Нельзя запустить игру в скачанной странице");
                }
                else if (event.target && event.target.tagName === 'SCRIPT') {
                    displayError("Не удалось загрузить модуль: "+String(event.target.src));
                }
            }, true);
            // Сгенерировано ИИ //
            window.onerror = function(_, source) {
                if (source && (source.includes('assets/') || source.includes('index-'))) {
                    displayError("Не удалось загрузить модуль: "+String(source));
                    return true;
                }
            }
            
            window.addEventListener("unhandledrejection", function(event){
                if (event.reason && String(event.reason).includes("dynamically imported module")) {
                    displayError("Перезагрузите страницу.");

                    const elButton = document.createElement("button");
                    elButton.classList.add("reloadButton");
                    elButton.textContent = "Перезагрузить";
                    elButton.onclick = function(){
                        // Сгенерировано ИИ //
                        // Очистка жесткого кэша для GitHub Pages
                        if ("serviceWorker" in navigator) {
                            navigator.serviceWorker.getRegistrations().then(registrations => {
                                for (let registration of registrations) registration.unregister();
                            });
                        }
                        // Перезагрузка в обход кэша
                        window.location.reload(true);
                    };

                    document.getElementById("g-progressBar").classList.add("hide");
                    document.getElementById("g-divProgressBar").appendChild(elButton);
                }
            });
        }
    </script>
    
</body>
</html>
